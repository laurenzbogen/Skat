services:
  dashboard:
    build: ./dashboard
    volumes:
      - pip-cache:/usr/local/lib/python3.13/site-packages
      - ./dashboard:/dashboard
    command: python3 chart.py
    ports:
      - "8050:8050"
    environment:
      GRIST_API_TOKEN: "5b9e04ffc98c81022eeb74067c22ca065624c5b8"
      GRIST_URL: "http://grist:8484"
      GRIST_DOC_ID: "mZg4zVZxcM8Ac7dSiZLn1A"
    depends_on:
      grist:
        condition: service_healthy
    restart: on-failure
  grist:
    image: gristlabs/grist
    user: "1000:1000"
    environment:
      #GRIST_FORWARD_AUTH_HEADER: X-Forwarded-User
      #GRIST_FORWARD_AUTH_LOGOUT_PATH: _oauth/logout
      GRIST_SINGLE_ORG: grist  # alternatively, GRIST_ORG_IN_PATH: "true" for multi-team operation
      GRIST_DEFAULT_EMAIL: myemail
      # APP_HOME_URL: https://localhost
      APP_HOME_URL: http://localhost:8484
    ports:
      - "8484:8484"
    volumes:
      # You may want to put state somewhere other than /tmp :-)
      - ./grist-data:/persist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8484"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      grist:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  pip-cache:
